name: Build and verify OCI image

on:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - TOOLCHAIN.lock
      - gateway/**
      - scripts/**
      - supervisor/**
      - templates/**
      - web/**
      - .github/workflows/build-image.yml
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - TOOLCHAIN.lock
      - gateway/**
      - scripts/**
      - supervisor/**
      - templates/**
      - web/**
      - .github/workflows/build-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      IMAGE: ghcr.io/koh0920/ossm-vol1-lab
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build amd64 image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --tag "$IMAGE:sha-$GITHUB_SHA" \
            .

      - name: Enforce initial image size ceiling
        run: |
          size=$(docker image inspect "$IMAGE:sha-$GITHUB_SHA" --format '{{.Size}}')
          test "$size" -le 6442450944
          echo "Uncompressed image size: $size bytes" >> "$GITHUB_STEP_SUMMARY"

      - name: Run E2E checks
        run: |
          mkdir -p .tmp/workspace .tmp/downloads
          sudo chown -R 1000:1000 .tmp/workspace
          docker run -d --name ossm-lab \
            --platform linux/amd64 \
            --user 1000:1000 \
            -p 127.0.0.1:3000:3000 \
            -v "$PWD/.tmp/workspace:/foss/designs" \
            "$IMAGE:sha-$GITHUB_SHA"
          trap 'docker logs ossm-lab; docker rm -f ossm-lab' EXIT
          for attempt in $(seq 1 120); do
            curl --fail --silent http://127.0.0.1:3000/healthz && break
            sleep 1
          done
          curl --fail http://127.0.0.1:3000/healthz
          docker exec ossm-lab /opt/ossm/scripts/verify-toolchain.sh
          docker exec ossm-lab labctl doctor --full
          docker exec ossm-lab labctl check drc
          docker exec ossm-lab labctl check drc --negative
          docker exec ossm-lab labctl check lvs
          docker exec ossm-lab labctl check lvs --negative
          docker exec ossm-lab labctl export
          curl --fail --output .tmp/downloads/latest.zip http://127.0.0.1:3000/downloads/latest.zip
          curl --fail --output .tmp/downloads/latest.zip.sha256 http://127.0.0.1:3000/downloads/latest.zip.sha256
          (cd .tmp/downloads && sha256sum --check latest.zip.sha256)
          test "$(docker port ossm-lab | wc -l)" -eq 1

      - name: Authenticate to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push verified image
        if: github.event_name != 'pull_request'
        run: |
          docker push "$IMAGE:sha-$GITHUB_SHA" | tee .tmp/push.log
          docker tag "$IMAGE:sha-$GITHUB_SHA" "$IMAGE:edge"
          docker push "$IMAGE:edge"
          digest=$(awk '/digest:/ {print $3; exit}' .tmp/push.log)
          test -n "$digest"
          echo "Verified digest: \`$IMAGE@$digest\`" >> "$GITHUB_STEP_SUMMARY"
